services:
  - type: web
    name: tez-news-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: false
    disks:
      - name: tez-news-data
        mountPath: /opt/render/project/data
    envVars:
      - key: APP_ENV
        value: production
      - key: SECRET_KEY
        sync: false
      - key: BACKEND_CORS_ORIGINS
        sync: false
      - key: SQLITE_PATH
        value: /opt/render/project/data/tez_news.db
      - key: RPC_URL
        sync: false
      - key: PRIVATE_KEY
        sync: false
      - key: CONTRACT_ADDRESS
        sync: false
      - key: CHAIN_ID
        value: "11155111"
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-flash-latest
      - key: GEMINI_TIMEOUT_SECONDS
        value: "30"
      - key: GEMINI_USE_GOOGLE_SEARCH
        value: "true"
